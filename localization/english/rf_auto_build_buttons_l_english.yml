 rf_auto_build_port_on_tt: "Auto-Build for Ports enabled."
 rf_auto_build_port_off_tt: "Auto-Build for Ports disabled."
 rf_auto_build_power_on_tt: "Auto-Build for Power Plants enabled."
 rf_auto_build_power_off_tt: "Auto-Build for Power Plants disabled."
 rf_scripted_button_build_university: "Construct University"
 rf_scripted_button_build_university_desc: "Manually queue one University in a state without one. The autobuilder stops once every eligible state has one built or queued."
 rf_scripted_button_auto_build_university_activate: "Enable Auto-Build: University"
 rf_scripted_button_auto_build_university_activate_desc: "Toggle auto-build: automatically queues Universities in states that lack one, scaling only until coverage is complete."
 rf_scripted_button_auto_build_university_deactivate: "Disable Auto-Build: University"
