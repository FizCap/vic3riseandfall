 rf_scripted_button_auto_build_construction_activate: "Enable Auto-Build: Construction Sector"
 rf_scripted_button_auto_build_construction_activate_desc: "Toggle auto-build: automatically constructs Construction Sectors in dynamic batches when the economy can afford expansion and construction is not being wasted."
