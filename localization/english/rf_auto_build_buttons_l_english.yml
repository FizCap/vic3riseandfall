 rf_scripted_button_auto_build_power_activate: "Enable Auto-Build: Power Plant"
 rf_scripted_button_auto_build_power_activate_desc: "Toggle auto-build: automatically queues Power Plant batches that scale with affordability and queue room, prioritizing one plant in every eligible state before expansion."
 rf_scripted_button_auto_build_power_deactivate: "Disable Auto-Build: Power Plant"
 rf_scripted_button_auto_build_power_deactivate_desc: "Disable auto-build for Power Plants; manual constructions remain available."
