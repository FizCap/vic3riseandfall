 rf_scripted_button_auto_build_railway: "Enable Auto-Build: Railway"
 rf_scripted_button_auto_build_railway_desc: "Toggle auto-build: automatically constructs Railways in eligible states, scaling with affordability and queue room."
 rf_scripted_button_auto_build_railway_deactivate: "Disable Auto-Build: Railway"
 rf_scripted_button_auto_build_railway_deactivate_desc: "Disable auto-build for Railways; manual constructions remain available."
 rf_scripted_button_auto_build_port_activate: "Enable Auto-Build: Port"
