l_english:
 rf_scripted_button_auto_build_admin_activate: "Enable Auto-Build: Government Administration"
 rf_scripted_button_auto_build_admin_activate_desc: "Toggle auto-build: automatically queues Government Administration in dynamic affordability-based batches, fixing bureaucracy first."
 rf_scripted_button_build_port: "Construct Port"
 rf_scripted_button_build_port_desc: "Manually construct Ports in every eligible coastal state with falling infrastructure (infrastructure_delta < 0, turmoil < 0.5)."
 rf_scripted_button_build_railway: "Construct Railway"
 rf_scripted_button_build_railway_desc: "Manually construct Railways in every eligible state with falling infrastructure (infrastructure_delta < 0, turmoil < 0.5). Requires Railway tech for auto-build."
 rf_scripted_button_build_admin_center: "Construct Government Administration"
 rf_scripted_button_build_admin_center_desc: "Manually queue Government Administration. The button fixes bureaucracy first; countries with spare bureaucracy can also target incorporated states with insufficient tax capacity."
